<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 60" fill="none">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@800&amp;display=swap');</style>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0.15"/>
    </linearGradient>
  </defs>

  <!-- Icon background pill -->
  <rect x="0" y="4" width="52" height="52" rx="14" fill="url(#g2)"/>

  <!-- Server rows -->
  <rect x="9" y="14" width="34" height="8" rx="2.5" fill="url(#g1)"/>
  <rect x="9" y="26" width="34" height="8" rx="2.5" fill="url(#g1)" opacity="0.6"/>
  <rect x="9" y="38" width="34" height="8" rx="2.5" fill="url(#g1)" opacity="0.3"/>

  <!-- LED dots -->
  <circle cx="37" cy="18" r="2.2" fill="white" opacity="0.95"/>
  <circle cx="37" cy="30" r="2.2" fill="white" opacity="0.95"/>
  <circle cx="37" cy="42" r="2.2" fill="white" opacity="0.95"/>

  <!-- Wordmark -->
  <text x="64" y="39" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="28" font-weight="800" letter-spacing="-1" fill="#0f172a">host</text>
  <text x="124" y="39" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="28" font-weight="800" letter-spacing="-1" fill="url(#g1)">panel</text>
</svg>
