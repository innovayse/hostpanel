services:
  # ── Infrastructure ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-hostpanel_dev}
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - "5673:5672"
      - "15673:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  mailhog:
    image: mailhog/mailhog
    ports:
      - "1026:1025"
      - "8027:8025"
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 256M

  # ── Application ─────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
      target: dev
    ports:
      - "5149:5148"
    volumes:
      - ./backend:/app
      - backend_bin:/app/src/Innovayse.API/bin
      - backend_obj:/app/src/Innovayse.API/obj
      - backend_packages:/root/.nuget/packages
    environment:
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-hostpanel_dev};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}"
      ASPNETCORE_ENVIRONMENT: Development
      Jwt__Secret: ${JWT_SECRET:-change-this-to-a-32-char-min-secret-key-here}
      Jwt__Issuer: ${JWT_ISSUER:-innovayse-api}
      Jwt__Audience: ${JWT_AUDIENCE:-innovayse-clients}
      RabbitMQ__Host: rabbitmq
      RabbitMQ__User: ${RABBITMQ_USER:-guest}
      RabbitMQ__Password: ${RABBITMQ_PASSWORD:-guest}
      Cors__AllowedOrigins__0: http://localhost:3001
      Cors__AllowedOrigins__1: http://localhost:5174
      Cors__AllowedOrigins__2: http://panel.local
      Smtp__Host: mailhog
      Smtp__Port: 1025
      Smtp__Username: ""
      Smtp__Password: ""
      Smtp__FromEmail: noreply@innovayse.com
      Smtp__FromName: Innovayse
      Smtp__UseSsl: "false"
      AdminBaseUrl: ${ADMIN_BASE_URL:-http://localhost:5174}
      DOTNET_USE_POLLING_FILE_WATCHER: 1
      DOTNET_NUGET_SIGNATURE_VERIFICATION: "false"
      NUGET_AUDIT: "false"
      Sso__Authority: http://innovayse-sso-sso-api-1:8080
      Sso__ClientId: hostpanel
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      mailhog:
        condition: service_started
    networks:
      - default
      - innovayse_network
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G

  client:
    build:
      context: .
      dockerfile: docker/client.Dockerfile
      target: dev
    ports:
      - "3001:3000"
    volumes:
      - ./client:/app
      - client_node_modules:/app/node_modules
    environment:
      API_URL: http://api:5148
      NUXT_PUBLIC_BASE_URL: http://localhost:3001
      STRIPE_PUBLISHABLE_KEY: pk_test_51Tc3tOEHRuUOoZmggqrvyuddpdtx6FtKaUSvqQXkwokJakOBFCLRDlX6troVkkjFw966agSmLKnu1NSlOAki6u9600PatIOktW
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      - api
    networks:
      - default
      - innovayse_network
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 2G

  admin:
    build:
      context: .
      dockerfile: docker/admin.Dockerfile
      target: dev
    ports:
      - "5174:5173"
    volumes:
      - ./admin:/app
      - admin_node_modules:/app/node_modules
    environment:
      VITE_API_BASE: /api
      API_PROXY_TARGET: http://api:5148
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      - api
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1536M

volumes:
  pgdata:
  client_node_modules:
  admin_node_modules:
  backend_bin:
  backend_obj:
  backend_packages:

networks:
  default:
  innovayse_network:
    external: true
    name: innovayse-cloud-local_innovayse_network
