services:
  # ── Infrastructure ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-innovayse_dev}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  mailhog:
    image: mailhog/mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 256M

  # ── Application ─────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
      target: dev
    ports:
      - "5148:5148"
    volumes:
      - ./backend:/app
    environment:
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-innovayse_dev};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}"
      ASPNETCORE_ENVIRONMENT: Development
      Jwt__Secret: ${JWT_SECRET:-change-this-to-a-32-char-min-secret-key-here}
      Jwt__Issuer: ${JWT_ISSUER:-innovayse-api}
      Jwt__Audience: ${JWT_AUDIENCE:-innovayse-clients}
      RabbitMQ__Host: rabbitmq
      RabbitMQ__User: ${RABBITMQ_USER:-guest}
      RabbitMQ__Password: ${RABBITMQ_PASSWORD:-guest}
      Cors__AllowedOrigins__0: http://localhost:3000
      Cors__AllowedOrigins__1: http://localhost:5173
      Smtp__Host: mailhog
      Smtp__Port: 1025
      Smtp__Username: ""
      Smtp__Password: ""
      Smtp__FromEmail: noreply@innovayse.com
      Smtp__FromName: Innovayse
      Smtp__UseSsl: "false"
      AdminBaseUrl: ${ADMIN_BASE_URL:-http://localhost:5173}
      DOTNET_USE_POLLING_FILE_WATCHER: 1
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      mailhog:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G

  client:
    build:
      context: .
      dockerfile: docker/client.Dockerfile
      target: dev
    ports:
      - "3000:3000"
    volumes:
      - ./client:/app
      - client_node_modules:/app/node_modules
    environment:
      API_URL: http://api:5148
      NUXT_PUBLIC_BASE_URL: http://localhost:3000
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      - api
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 2G

  admin:
    build:
      context: .
      dockerfile: docker/admin.Dockerfile
      target: dev
    ports:
      - "5173:5173"
    volumes:
      - ./admin:/app
      - admin_node_modules:/app/node_modules
    environment:
      VITE_API_BASE: /api
      API_PROXY_TARGET: http://api:5148
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      - api
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1536M

volumes:
  pgdata:
  client_node_modules:
  admin_node_modules:
